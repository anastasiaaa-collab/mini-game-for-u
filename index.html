<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Drop - Ruang Tenangmu ✨</title>
    
    <style>
        :root {
            --bg-color: #f7f9fc;
            --accent-soft: #ffcfdf; /* Pink Pastel */
            --mint: #d1f2eb;      /* Hijau Mint */
            --text-color: #5d6d7e;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: fadeIn 1.5s ease;
        }

        header h1 { margin-bottom: 5px; font-weight: 300; letter-spacing: 2px; }
        #affirmation { font-style: italic; color: #aab7b8; min-height: 1.2em; margin-bottom: 15px; }

        #game-canvas-area {
            position: relative;
            display: inline-block;
        }

        canvas {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            border: 6px solid white;
            cursor: crosshair;
            touch-action: none;
        }

        .controls { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }

        .btn-soft {
            background: white;
            border: 2px solid var(--mint);
            padding: 8px 15px;
            border-radius: 12px;
            color: #45b39d;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-soft:hover { background: var(--mint); color: white; }

        #focus-timer { font-size: 0.9em; font-weight: bold; color: #bdc3c7; }

        /* Modal Mindfulness */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content { text-align: center; padding: 20px; }

        .breathing-circle {
            width: 120px;
            height: 120px;
            background: var(--accent-soft);
            border-radius: 50%;
            margin: 40px auto;
            animation: breathe 4s infinite ease-in-out;
            box-shadow: 0 0 30px var(--accent-soft);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 0.8; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #start-btn {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: #eee;
            color: #999;
            font-weight: bold;
        }

        #start-btn.ready {
            background: var(--mint);
            color: #45b39d;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <h1>Zen Drop</h1>
            <p id="affirmation">Ambil napas dalam-dalam...</p>
        </header>
        
        <div id="game-canvas-area">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="resetGame()" class="btn-soft">Mulai Ulang Lembut</button>
            <div id="focus-timer">Sesi Fokus: 02:00</div>
        </div>
    </div>

    <div id="mindfulness-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-weight: 300;">Tarik Napas Sejenak... 🌿</h2>
            <div class="breathing-circle"></div>
            <p style="color: #7f8c8d;">Mari tenangkan pikiran sejenak sebelum mulai.</p>
            <br>
            <button id="start-btn">Mohon tunggu...</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        let engine, render, runner;
        const affirmations = [
            "Kamu melakukan yang terbaik ✨",
            "Satu langkah kecil tetaplah progres 🌿",
            "Pikiranmu berhak istirahat ☁️",
            "Pelan-pelan saja, tidak perlu buru-buru 🌸",
            "Bernapaslah, kamu aman di sini 🐚"
        ];

        // 1. Timer Penunggu di Awal (Mindfulness)
        const startBtn = document.getElementById('start-btn');
        let countdown = 5;
        const timerWait = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timerWait);
                startBtn.innerText = "Mulai Bermain Pelan-pelan";
                startBtn.classList.add('ready');
                startBtn.onclick = () => {
                    document.getElementById('mindfulness-modal').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('mindfulness-modal').style.display = 'none';
                        initGame();
                    }, 500);
                };
            } else {
                startBtn.innerText = `Siap dalam ${countdown}...`;
            }
        }, 1000);

        // 2. Inisialisasi Game
        function initGame() {
            engine = Engine.create();
            render = Render.create({
                element: document.getElementById('game-canvas-area'),
                canvas: document.getElementById('gameCanvas'),
                options: {
                    width: 320,
                    height: 450,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // Batas Area
            const ground = Bodies.rectangle(160, 460, 320, 20, { isStatic: true, render: { fillStyle: '#d1f2eb' } });
            const leftWall = Bodies.rectangle(-10, 225, 20, 450, { isStatic: true });
            const rightWall = Bodies.rectangle(330, 225, 20, 450, { isStatic: true });

            Composite.add(engine.world, [ground, leftWall, rightWall]);
            
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            setupClickAction();
            startFocusTimer();
        }

        // 3. Logika Menjatuhkan Buah
        function setupClickAction() {
            const canvas = document.getElementById('gameCanvas');
            const colors = ['#FFCFDF', '#FEFDED', '#D1F2EB', '#EADFB4', '#C5EBAA'];
            
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                
                // Ukuran random yang nyaman dilihat
                const radius = 15 + Math.random() * 15;
                const fruit = Bodies.circle(x, 20, radius, {
                    restitution: 0.4,
                    friction: 0.1,
                    render: { fillStyle: colors[Math.floor(Math.random() * colors.length)] }
                });
                
                Composite.add(engine.world, fruit);
                
                // Reward Pesan Positif
                if (Math.random() > 0.8) {
                    const text = affirmations[Math.floor(Math.random() * affirmations.length)];
                    document.getElementById('affirmation').innerText = text;
                }
            });
        }

        // 4. Timer Fokus (ADHD friendly)
        function startFocusTimer() {
            let timeLeft = 120;
            const timerDisplay = document.getElementById('focus-timer');
            const timer = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `Sesi Fokus: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('affirmation').innerText = "Sesi selesai. Bangga padamu! 🌟";
                }
                timeLeft--;
            }, 1000);
        }

        function resetGame() {
            Composite.clear(engine.world, false);
            const colors = ['#FFCFDF', '#FEFDED', '#D1F2EB', '#EADFB4', '#C5EBAA'];
            const ground = Bodies.rectangle(160, 460, 320, 20, { isStatic: true, render: { fillStyle: '#d1f2eb' } });
            Composite.add(engine.world, [ground]);
            document.getElementById('affirmation').innerText = "Memulai lembaran baru... 🌿";
        }
    </script>
</body>
</html>
